<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#1E1460"/>
      <stop offset="50%" stop-color="#3D2E9C"/>
      <stop offset="100%" stop-color="#2D1478"/>
    </linearGradient>
    <linearGradient id="hourglassTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6D5FD8"/>
    </linearGradient>
    <linearGradient id="hourglassBot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C5FCC"/>
      <stop offset="100%" stop-color="#4C3BAF"/>
    </linearGradient>
    <linearGradient id="sandFlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="hgShadow" x="-25%" y="-15%" width="150%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0D0830" flood-opacity="0.6"/>
    </filter>
    <filter id="sparkleGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sandGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="topBulb">
      <path d="M165 148 Q165 100 256 100 Q347 100 347 148 L290 256 L222 256 Z"/>
    </clipPath>
    <clipPath id="botBulb">
      <path d="M222 256 L290 256 L347 364 Q347 412 256 412 Q165 412 165 364 Z"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg2)"/>

  <!-- Subtle radial glow center -->
  <ellipse cx="256" cy="256" rx="180" ry="200" fill="url(#glowCenter)"/>

  <!-- Hourglass frame outer shape (top half) -->
  <g filter="url(#hgShadow)">
    <!-- Top bulb fill -->
    <path d="M168 148 Q168 96 256 96 Q344 96 344 148 L288 256 L224 256 Z"
          fill="url(#hourglassTop)" opacity="0.92"/>

    <!-- Bottom bulb fill -->
    <path d="M224 256 L288 256 L344 364 Q344 416 256 416 Q168 416 168 364 Z"
          fill="url(#hourglassBot)" opacity="0.92"/>
  </g>

  <!-- Hourglass outer stroke / frame -->
  <path d="M168 148 Q168 96 256 96 Q344 96 344 148 L288 256 L344 364 Q344 416 256 416 Q168 416 168 364 L224 256 Z"
        fill="none" stroke="url(#frameGrad)" stroke-width="3.5" opacity="0.9"/>

  <!-- Top horizontal bar -->
  <rect x="152" y="136" width="208" height="18" rx="9" fill="url(#frameGrad)" opacity="0.95"/>
  <!-- Bottom horizontal bar -->
  <rect x="152" y="358" width="208" height="18" rx="9" fill="url(#frameGrad)" opacity="0.95"/>

  <!-- Sand in top bulb (partially drained) -->
  <path d="M224 256 L255 256 L240 210 Z" fill="#E0D7FF" opacity="0.35" clip-path="url(#topBulb)"/>
  <path d="M232 244 Q256 228 282 244 L288 256 L224 256 Z" fill="#C4B5FD" opacity="0.45" clip-path="url(#topBulb)"/>

  <!-- Sand trickle at waist -->
  <ellipse cx="256" cy="256" rx="5" ry="12" fill="url(#sandFlow)" filter="url(#sandGlow)"/>

  <!-- Sand collected in bottom bulb -->
  <path d="M224 256 L288 256 L300 285 Q256 295 212 285 Z" fill="#C4B5FD" opacity="0.5" clip-path="url(#botBulb)"/>
  <ellipse cx="256" cy="370" rx="62" ry="22" fill="#A78BFA" opacity="0.4" clip-path="url(#botBulb)"/>

  <!-- Inner glass shine on top bulb -->
  <path d="M188 160 Q196 130 230 118" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Milestone sparkle dots scattered around hourglass -->
  <!-- Top-left cluster -->
  <g filter="url(#sparkleGlow)">
    <circle cx="118" cy="148" r="5"  fill="#FCD34D" opacity="0.9"/>
    <circle cx="96"  cy="188" r="3.5" fill="#FCD34D" opacity="0.7"/>
    <circle cx="130" cy="108" r="3"  fill="#FCD34D" opacity="0.6"/>
    <!-- Star cross at 118,148 -->
    <line x1="118" y1="138" x2="118" y2="158" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="108" y1="148" x2="128" y2="148" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="111" y1="141" x2="125" y2="155" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
    <line x1="125" y1="141" x2="111" y2="155" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round" opacity="0.55"/>
  </g>

  <!-- Top-right cluster -->
  <g filter="url(#sparkleGlow)">
    <circle cx="394" cy="130" r="5"  fill="#FCD34D" opacity="0.9"/>
    <circle cx="416" cy="168" r="3.5" fill="#A78BFA" opacity="0.85"/>
    <circle cx="378" cy="100" r="3"  fill="#C4B5FD" opacity="0.7"/>
    <line x1="394" y1="120" x2="394" y2="140" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="384" y1="130" x2="404" y2="130" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Bottom-right cluster -->
  <g filter="url(#sparkleGlow)">
    <circle cx="400" cy="370" r="4.5" fill="#FCD34D" opacity="0.85"/>
    <circle cx="418" cy="340" r="3"  fill="#A78BFA" opacity="0.7"/>
    <line x1="400" y1="362" x2="400" y2="378" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
    <line x1="392" y1="370" x2="408" y2="370" stroke="#FCD34D" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
  </g>

  <!-- Bottom-left cluster -->
  <g filter="url(#sparkleGlow)">
    <circle cx="112" cy="362" r="4"  fill="#C4B5FD" opacity="0.8"/>
    <circle cx="96"  cy="330" r="3"  fill="#FCD34D" opacity="0.65"/>
  </g>

  <!-- Floating sparkle dots along sides -->
  <circle cx="80"  cy="256" r="3"   fill="#A78BFA" opacity="0.6"/>
  <circle cx="432" cy="256" r="3"   fill="#A78BFA" opacity="0.6"/>
  <circle cx="70"  cy="290" r="2"   fill="#C4B5FD" opacity="0.45"/>
  <circle cx="442" cy="220" r="2"   fill="#C4B5FD" opacity="0.45"/>

  <!-- MAI text -->
  <text x="256" y="476"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="800" letter-spacing="10"
        fill="white" text-anchor="middle" opacity="0.82">MAI</text>
</svg>
