<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- App background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D1B7E"/>
      <stop offset="100%" stop-color="#1A0F5C"/>
    </linearGradient>
    <!-- Hourglass fill gradient top -->
    <linearGradient id="sandTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Hourglass fill gradient bottom -->
    <linearGradient id="sandBottomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5E6AD2"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <!-- Hourglass body gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0.25"/>
    </linearGradient>
    <!-- Frame gradient -->
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DDD6FE"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft shadow -->
    <filter id="softShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#0D0730" flood-opacity="0.6"/>
    </filter>
    <!-- Sparkle glow -->
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Sand particle gradient -->
    <radialGradient id="particleGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Background subtle radial highlight -->
  <radialGradient id="bgHighlight" cx="50%" cy="35%" r="50%">
    <stop offset="0%" stop-color="#5E35B1" stop-opacity="0.4"/>
    <stop offset="100%" stop-color="#1A0F5C" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgHighlight)"/>

  <!-- Hourglass group with shadow -->
  <g filter="url(#softShadow)">

    <!-- Top bar -->
    <rect x="152" y="98" width="208" height="22" rx="11" fill="url(#frameGrad)" opacity="0.95"/>
    <!-- Bottom bar -->
    <rect x="152" y="392" width="208" height="22" rx="11" fill="url(#frameGrad)" opacity="0.95"/>

    <!-- Hourglass outline / glass shape -->
    <!-- Top bulge -->
    <path d="M163 120 Q163 240 256 270 Q349 240 349 120 Z"
          fill="url(#glassGrad)" stroke="#C4B5FD" stroke-width="2" stroke-opacity="0.4"/>
    <!-- Bottom bulge -->
    <path d="M163 392 Q163 272 256 242 Q349 272 349 392 Z"
          fill="url(#glassGrad)" stroke="#C4B5FD" stroke-width="2" stroke-opacity="0.4"/>

    <!-- Sand fill top (flowing down, partially empty) -->
    <clipPath id="topClip">
      <path d="M163 120 Q163 240 256 270 Q349 240 349 120 Z"/>
    </clipPath>
    <!-- Sand level in top: about 60% full -->
    <rect x="150" y="120" width="220" height="115" clip-path="url(#topClip)" fill="url(#sandTopGrad)" opacity="0.85"/>
    <!-- Sand surface curve -->
    <path d="M175 235 Q256 248 337 235" fill="none" stroke="#DDD6FE" stroke-width="2" stroke-opacity="0.6"/>

    <!-- Sand fill bottom (accumulated) -->
    <clipPath id="bottomClip">
      <path d="M163 392 Q163 272 256 242 Q349 272 349 392 Z"/>
    </clipPath>
    <!-- Sand level in bottom: about 40% full (rising from bottom) -->
    <rect x="150" y="340" width="220" height="60" clip-path="url(#bottomClip)" fill="url(#sandBottomGrad)" opacity="0.9"/>
    <!-- Sand surface curve bottom -->
    <path d="M183 340 Q256 333 329 340" fill="none" stroke="#A78BFA" stroke-width="2" stroke-opacity="0.5"/>

    <!-- Neck / waist area -->
    <path d="M232 268 L232 244 Q256 236 280 244 L280 268 Q256 276 232 268 Z"
          fill="#8B5CF6" opacity="0.6"/>

    <!-- Falling sand stream at neck -->
    <line x1="256" y1="270" x2="256" y2="240" stroke="#EDE9FE" stroke-width="3" stroke-linecap="round" stroke-opacity="0.8"/>
    <!-- Sand droplets -->
    <circle cx="256" cy="275" r="2.5" fill="#EDE9FE" opacity="0.9"/>
    <circle cx="254" cy="283" r="1.8" fill="#DDD6FE" opacity="0.7"/>
    <circle cx="258" cy="289" r="1.5" fill="#C4B5FD" opacity="0.6"/>

  </g>

  <!-- Milestone sparkle stars scattered around hourglass -->

  <!-- Star 1 — top left area -->
  <g transform="translate(118, 148)" filter="url(#sparkGlow)" opacity="0.95">
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#F0EDFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="9" y2="0" stroke="#F0EDFF" stroke-width="2" stroke-linecap="round"/>
    <line x1="-6.5" y1="-6.5" x2="6.5" y2="6.5" stroke="#DDD6FE" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6.5" y1="-6.5" x2="-6.5" y2="6.5" stroke="#DDD6FE" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Star 2 — top right area -->
  <g transform="translate(394, 132)" filter="url(#sparkGlow)" opacity="0.85">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#C4B5FD" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#C4B5FD" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#A78BFA" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#A78BFA" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Star 3 — right middle -->
  <g transform="translate(405, 256)" filter="url(#sparkGlow)" opacity="0.75">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#A78BFA" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Star 4 — bottom left -->
  <g transform="translate(108, 370)" filter="url(#sparkGlow)" opacity="0.8">
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#DDD6FE" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#DDD6FE" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-5.5" y1="-5.5" x2="5.5" y2="5.5" stroke="#C4B5FD" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="5.5" y1="-5.5" x2="-5.5" y2="5.5" stroke="#C4B5FD" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Star 5 — bottom right -->
  <g transform="translate(398, 388)" filter="url(#sparkGlow)" opacity="0.7">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" stroke="#A78BFA" stroke-width="1" stroke-linecap="round"/>
    <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" stroke="#A78BFA" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Star 6 — upper center-left -->
  <g transform="translate(140, 256)" filter="url(#sparkGlow)" opacity="0.6">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#9F7AEA" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="#9F7AEA" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Tiny dot milestones scattered -->
  <circle cx="390" cy="175" r="3" fill="#C4B5FD" opacity="0.6" filter="url(#glow)"/>
  <circle cx="122" cy="315" r="2.5" fill="#A78BFA" opacity="0.55" filter="url(#glow)"/>
  <circle cx="380" cy="340" r="2" fill="#8B5CF6" opacity="0.5" filter="url(#glow)"/>
  <circle cx="132" cy="185" r="2" fill="#C4B5FD" opacity="0.45" filter="url(#glow)"/>

  <!-- "MAI" monogram at very bottom, inside bottom frame area -->
  <text x="256" y="449"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="700" letter-spacing="7"
        fill="#DDD6FE" opacity="0.55" text-anchor="middle">MAI</text>

</svg>
