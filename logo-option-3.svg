<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#312077"/>
      <stop offset="50%" stop-color="#4A35B0"/>
      <stop offset="100%" stop-color="#1E1460"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C6FE8"/>
      <stop offset="60%" stop-color="#5E6AD2"/>
      <stop offset="100%" stop-color="#4C3BAF"/>
    </linearGradient>
    <linearGradient id="shieldHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#A78BFA"/>
      <stop offset="70%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#C4B5FD" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="mGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="shieldShadow" x="-20%" y="-15%" width="140%" height="135%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0D0830" flood-opacity="0.6"/>
    </filter>
    <filter id="mGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg3)"/>

  <!-- Subtle diagonal sheen on background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#shieldHighlight)" opacity="0.4"/>

  <!-- Shield / badge shape -->
  <g filter="url(#shieldShadow)">
    <path d="M256 74
             L390 120
             L390 270
             Q390 370 256 438
             Q122 370 122 270
             L122 120
             Z"
          fill="url(#shieldGrad)"/>
  </g>

  <!-- Shield inner highlight (top edge) -->
  <path d="M256 86 L378 128 L378 130 L256 88 L134 130 L134 128 Z"
        fill="white" opacity="0.18"/>

  <!-- Shield outer stroke -->
  <path d="M256 74 L390 120 L390 270 Q390 370 256 438 Q122 370 122 270 L122 120 Z"
        fill="none" stroke="url(#strokeGrad)" stroke-width="3" opacity="0.85"/>

  <!-- Inner shield border (inset) -->
  <path d="M256 96 L372 136 L372 268 Q372 355 256 416 Q140 355 140 268 L140 136 Z"
        fill="none" stroke="white" stroke-width="1.2" opacity="0.15"/>

  <!-- Timeline arc inside shield, upper section -->
  <path d="M176 290 Q256 230 336 290"
        fill="none" stroke="url(#arcGrad)" stroke-width="4" stroke-linecap="round"/>

  <!-- Timeline nodes on the arc -->
  <!-- Left node -->
  <g filter="url(#nodeGlow)">
    <circle cx="176" cy="290" r="9"  fill="#FCD34D" opacity="0.95"/>
    <circle cx="176" cy="290" r="5"  fill="#FEF9C3"/>
  </g>
  <!-- Center node (apex) -->
  <g filter="url(#nodeGlow)">
    <circle cx="256" cy="243" r="10" fill="#FCD34D" opacity="0.95"/>
    <circle cx="256" cy="243" r="5.5" fill="#FFFBEB"/>
  </g>
  <!-- Right node -->
  <g filter="url(#nodeGlow)">
    <circle cx="336" cy="290" r="9"  fill="#FCD34D" opacity="0.95"/>
    <circle cx="336" cy="290" r="5"  fill="#FEF9C3"/>
  </g>

  <!-- Second timeline arc below -->
  <path d="M196 326 Q256 304 316 326"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Nodes on second arc -->
  <circle cx="196" cy="326" r="5" fill="#C4B5FD" opacity="0.8"/>
  <circle cx="256" cy="312" r="5" fill="#C4B5FD" opacity="0.8"/>
  <circle cx="316" cy="326" r="5" fill="#C4B5FD" opacity="0.8"/>

  <!-- Bold "M" monogram -->
  <g filter="url(#mGlow)">
    <text x="256" y="220"
          font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="132" font-weight="900"
          fill="url(#mGrad)"
          text-anchor="middle"
          dominant-baseline="auto"
          opacity="0.97">M</text>
  </g>

  <!-- "AI" subscript below M -->
  <text x="256" y="248"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700" letter-spacing="14"
        fill="white" text-anchor="middle" opacity="0.55">AI</text>

  <!-- Decorative corner sparkles on background -->
  <g fill="#C4B5FD" opacity="0.35">
    <polygon points="64,64 68,56 72,64 80,68 72,72 68,80 64,72 56,68" transform="scale(0.7) translate(50,40)"/>
    <polygon points="448,64 452,56 456,64 464,68 456,72 452,80 448,72 440,68" transform="scale(0.6) translate(210,35)"/>
    <polygon points="64,448 68,440 72,448 80,452 72,456 68,464 64,456 56,452" transform="scale(0.65) translate(40,220)"/>
  </g>

  <!-- Small sparkle dots -->
  <circle cx="82"  cy="152" r="3.5" fill="#A78BFA" opacity="0.5"/>
  <circle cx="68"  cy="180" r="2"   fill="#C4B5FD" opacity="0.4"/>
  <circle cx="430" cy="150" r="3.5" fill="#A78BFA" opacity="0.5"/>
  <circle cx="444" cy="178" r="2"   fill="#C4B5FD" opacity="0.4"/>
  <circle cx="96"  cy="380" r="3"   fill="#A78BFA" opacity="0.45"/>
  <circle cx="416" cy="380" r="3"   fill="#A78BFA" opacity="0.45"/>

  <!-- "MY AGE IN" micro text at bottom of shield -->
  <text x="256" y="398"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="14" font-weight="600" letter-spacing="4"
        fill="white" text-anchor="middle" opacity="0.55">MY AGE IN</text>
</svg>
