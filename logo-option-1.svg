<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#7C5FE0"/>
      <stop offset="100%" stop-color="#1E1060"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6D4FC8" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Clock circle -->
  <circle cx="256" cy="256" r="168" fill="none" stroke="url(#ring)" stroke-width="3"/>

  <!-- Hour hand (~10 o'clock) -->
  <line x1="256" y1="256" x2="196" y2="148" stroke="white" stroke-width="14" stroke-linecap="round"/>

  <!-- Minute hand (~2 o'clock) -->
  <line x1="256" y1="256" x2="336" y2="124" stroke="white" stroke-width="9" stroke-linecap="round" opacity="0.75"/>

  <!-- Accent dot at 12 — the "milestone" -->
  <circle cx="256" cy="90" r="14" fill="#A78BFA"/>
  <circle cx="256" cy="90" r="7" fill="white"/>

  <!-- Center pivot -->
  <circle cx="256" cy="256" r="10" fill="white"/>
</svg>
